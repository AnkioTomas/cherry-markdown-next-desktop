name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            CURRENT_TAG="${GITHUB_REF_NAME}"
          else
            CURRENT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          fi

          if [[ -z "${CURRENT_TAG}" ]]; then
            CURRENT_TAG="HEAD"
          fi

          PREV_TAG="$(
            git tag --sort=-version:refname \
              | awk -v cur="${CURRENT_TAG}" '$0 == cur { getline; print; exit }'
          )"

          {
            echo "## 更新日志"
            echo
            if [[ -n "${PREV_TAG}" ]]; then
              echo "对比: \`${PREV_TAG}\` → \`${CURRENT_TAG}\`"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
            else
              echo "首个发布"
              echo
              git log --pretty=format:'- %s (%h)' "${CURRENT_TAG}"
            fi
            echo
          } > release-notes.md

          {
            echo 'body<<EOF'
            cat release-notes.md
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "----- release notes -----"
          cat release-notes.md

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Penna Markdown v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
